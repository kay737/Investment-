<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>InvestSmart</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: system-ui, sans-serif; }
    body { background: #0b1120; color: #e5e7eb; padding: 16px; min-height: 100vh; }
    .container { max-width: 600px; margin: 0 auto; }
    .header { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px solid #1e293b; margin-bottom: 16px; flex-wrap: wrap; gap: 8px; }
    .logo { font-size: 1.5rem; background: linear-gradient(135deg, #60a5fa, #fbbf24); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .user-info { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
    .user-name { color: #94a3b8; font-size: 0.9rem; }
    .logout-btn { background: #dc2626; color: white; border: none; padding: 4px 12px; border-radius: 6px; cursor: pointer; font-size: 0.8rem; }
    .balance { background: #1e293b; padding: 4px 14px; border-radius: 20px; font-size: 0.9rem; font-weight: bold; color: #fbbf24; }
    .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 16px; }
    .card { background: #1e293b; padding: 16px; border-radius: 12px; border: 1px solid #334155; }
    .card .label { color: #94a3b8; font-size: 0.8rem; }
    .card .value { font-size: 1.5rem; font-weight: bold; margin-top: 4px; }
    .green { color: #4ade80; }
    .chart-container { background: #1e293b; border-radius: 12px; border: 1px solid #334155; padding: 12px; margin-bottom: 12px; height: 280px; }
    #chart { width: 100%; height: 100%; }
    .symbol-select { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 12px; justify-content: center; }
    .symbol-select button { padding: 5px 14px; background: #2d3748; border: none; border-radius: 20px; color: #94a3b8; cursor: pointer; font-size: 0.8rem; }
    .symbol-select button.active { background: #3b82f6; color: white; }
    .stocks { background: #1e293b; padding: 16px; border-radius: 12px; border: 1px solid #334155; }
    .stocks h3 { color: #94a3b8; margin-bottom: 12px; font-size: 0.9rem; }
    .row { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #334155; align-items: center; flex-wrap: wrap; gap: 4px; }
    .row:last-child { border-bottom: none; }
    .btn { background: #3b82f6; color: white; border: none; padding: 4px 12px; border-radius: 6px; cursor: pointer; font-size: 0.8rem; }
    .add-btn { width: 100%; padding: 10px; background: transparent; border: 1px dashed #3b82f6; border-radius: 8px; color: #3b82f6; cursor: pointer; margin-top: 12px; font-size: 0.9rem; }
    .status { text-align: center; padding: 4px; font-size: 0.7rem; color: #4ade80; margin-bottom: 8px; }
    
    .auth-container { display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }
    .auth-box { background: #1e293b; padding: 30px; border-radius: 16px; border: 1px solid #334155; max-width: 400px; width: 100%; }
    .auth-box h2 { text-align: center; margin-bottom: 20px; }
    .auth-box input { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #334155; background: #0b1120; color: white; margin: 8px 0; font-size: 1rem; }
    .auth-box button { width: 100%; padding: 12px; background: #3b82f6; color: white; border: none; border-radius: 8px; font-size: 1rem; cursor: pointer; margin-top: 12px; }
    .auth-box button:hover { background: #2563eb; }
    .auth-box .switch { text-align: center; margin-top: 12px; color: #94a3b8; }
    .auth-box .switch a { color: #3b82f6; cursor: pointer; text-decoration: underline; }
    .auth-error { color: #f87171; font-size: 0.9rem; text-align: center; margin-top: 8px; }
    
    .modal { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.8); display: none; justify-content: center; align-items: center; z-index: 1000; padding: 20px; }
    .modal.active { display: flex; }
    .modal-content { background: #1e293b; padding: 24px; border-radius: 16px; max-width: 380px; width: 100%; border: 1px solid #334155; }
    .modal-content h2 { margin-bottom: 8px; }
    .modal-content input { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #334155; background: #0b1120; color: white; font-size: 1.2rem; margin: 10px 0; }
    .buy-btn { width: 100%; padding: 12px; background: #22c55e; color: white; border: none; border-radius: 8px; font-size: 1rem; cursor: pointer; margin: 4px 0; }
    .sell-btn { width: 100%; padding: 12px; background: #ef4444; color: white; border: none; border-radius: 8px; font-size: 1rem; cursor: pointer; margin: 4px 0; }
    .cancel-btn { width: 100%; padding: 12px; background: #334155; color: white; border: none; border-radius: 8px; font-size: 1rem; cursor: pointer; margin: 4px 0; }
    .close-btn { float: right; background: none; border: none; color: #94a3b8; font-size: 1.5rem; cursor: pointer; }
    .modal-btns { display: flex; gap: 8px; margin: 12px 0; }
    .modal-btns button { flex: 1; padding: 10px; border: none; border-radius: 8px; cursor: pointer; color: white; font-weight: bold; }
    .quick { display: flex; gap: 8px; margin: 8px 0 16px; }
    .quick button { flex: 1; padding: 6px; background: #2d3748; border: 1px solid #334155; border-radius: 6px; color: #94a3b8; cursor: pointer; }
    .total { color: #fbbf24; font-size: 1.2rem; font-weight: bold; margin: 12px 0; }
  </style>
</head>
<body>
<div id="app">
  <!-- AUTH SCREEN -->
  <div id="auth-screen" style="display:block;">
    <div class="auth-container">
      <div class="auth-box">
        <h2 class="logo" style="font-size:2rem; text-align:center;">📊 InvestSmart</h2>
        <p style="text-align:center; color:#94a3b8; margin-bottom:20px;">Your Investment Dashboard</p>
        
        <div id="login-form">
          <input type="email" id="login-email" placeholder="Email" />
          <input type="password" id="login-password" placeholder="Password" />
          <div id="login-error" class="auth-error"></div>
          <button onclick="loginUser()">Sign In</button>
          <div class="switch">Don't have an account? <a onclick="showRegister()">Sign Up</a></div>
        </div>
        
        <div id="register-form" style="display:none;">
          <input type="text" id="register-name" placeholder="Full Name" />
          <input type="email" id="register-email" placeholder="Email" />
          <input type="password" id="register-password" placeholder="Password" />
          <div id="register-error" class="auth-error"></div>
          <button onclick="registerUser()">Create Account</button>
          <div class="switch">Already have an account? <a onclick="showLogin()">Sign In</a></div>
        </div>
      </div>
    </div>
  </div>

  <!-- DASHBOARD -->
  <div id="dashboard" style="display:none;">
    <div class="container">
      <div class="header">
        <h1 class="logo">📊 InvestSmart</h1>
        <div class="user-info">
          <span class="user-name" id="user-name">User</span>
          <span class="balance">💰 $<span id="cash">50000</span></span>
          <button class="logout-btn" onclick="logoutUser()">Logout</button>
        </div>
      </div>

      <div class="grid">
        <div class="card"><div class="label">Portfolio</div><div class="value">$<span id="total">0</span></div></div>
        <div class="card"><div class="label">Holdings</div><div class="value"><span id="count">0</span></div></div>
      </div>

      <div class="chart-container">
        <canvas id="chart"></canvas>
      </div>
      <div id="status" class="status">✅ Live</div>

      <div class="symbol-select">
        <button onclick="changeChart('AAPL')" id="btn-AAPL" class="active">AAPL</button>
        <button onclick="changeChart('TSLA')" id="btn-TSLA">TSLA</button>
        <button onclick="changeChart('VTI')" id="btn-VTI">VTI</button>
        <button onclick="changeChart('BTCUSD')" id="btn-BTCUSD">BTC</button>
        <button onclick="changeChart('AMZN')" id="btn-AMZN">AMZN</button>
        <button onclick="changeChart('NVDA')" id="btn-NVDA">NVDA</button>
      </div>

      <div class="stocks">
        <h3>📊 Your Stocks</h3>
        <div id="list"></div>
        <button class="add-btn" onclick="openTrade('AAPL', 178.50)">+ Trade New Stock</button>
      </div>
    </div>
  </div>
</div>

<!-- TRADE MODAL -->
<div class="modal" id="modal">
  <div class="modal-content">
    <button class="close-btn" onclick="closeModal()">✕</button>
    <h2 id="modal-title">Trade AAPL</h2>
    <p>Price: $<span id="modal-price">0</span></p>
    <div class="modal-btns">
      <button id="buy-tab" style="background:#22c55e;" onclick="setTradeType('BUY')">Buy</button>
      <button id="sell-tab" style="background:#334155;" onclick="setTradeType('SELL')">Sell</button>
    </div>
    <input type="number" id="modal-shares" value="1" min="0.01" step="0.01">
    <div class="quick">
      <button onclick="setShares(1)">1</button>
      <button onclick="setShares(5)">5</button>
      <button onclick="setShares(10)">10</button>
      <button onclick="setShares(25)">25</button>
    </div>
    <div class="total">Total: $<span id="modal-total">0</span></div>
    <button class="buy-btn" id="confirm-btn" onclick="confirmTrade()">Buy</button>
    <button class="cancel-btn" onclick="closeModal()">Cancel</button>
  </div>
</div>

<script>
// =============================================
// ALL CODE IN ONE FILE - NO API NEEDED!
// Everything works locally in your browser
// =============================================

// --- AUTH (Local Storage) ---
let currentUser = null
let cash = 50000
let holdings = []
let selectedStock = null
let tradeType = "BUY"
let currentShares = 1
let chart = null
let currentSymbol = "AAPL"

// Check if user is logged in
function checkAuth() {
  const saved = localStorage.getItem('investsmart_user')
  if (saved) {
    const data = JSON.parse(saved)
    currentUser = data.user
    cash = data.cash || 50000
    holdings = data.holdings || [
      { symbol: "AAPL", shares: 120, price: 178.50 },
      { symbol: "TSLA", shares: 45, price: 245.30 },
      { symbol: "VTI", shares: 310, price: 259.80 },
      { symbol: "BTC", shares: 0.42, price: 67200 }
    ]
    showDashboard()
    return true
  }
  return false
}

function saveUser() {
  if (currentUser) {
    localStorage.setItem('investsmart_user', JSON.stringify({
      user: currentUser,
      cash: cash,
      holdings: holdings
    }))
  }
}

function showRegister() {
  document.getElementById('login-form').style.display = 'none'
  document.getElementById('register-form').style.display = 'block'
  document.getElementById('login-error').textContent = ''
  document.getElementById('register-error').textContent = ''
}

function showLogin() {
  document.getElementById('login-form').style.display = 'block'
  document.getElementById('register-form').style.display = 'none'
  document.getElementById('login-error').textContent = ''
  document.getElementById('register-error').textContent = ''
}

function registerUser() {
  const name = document.getElementById('register-name').value
  const email = document.getElementById('register-email').value
  const password = document.getElementById('register-password').value
  const errorEl = document.getElementById('register-error')
  
  if (!name || !email || !password) {
    errorEl.textContent = 'Please fill in all fields'
    return
  }
  
  // Check if user exists
  const saved = localStorage.getItem('investsmart_users')
  let users = saved ? JSON.parse(saved) : []
  
  if (users.find(u => u.email === email)) {
    errorEl.textContent = 'User already exists!'
    return
  }
  
  const user = { id: Date.now(), name, email, password }
  users.push(user)
  localStorage.setItem('investsmart_users', JSON.stringify(users))
  
  currentUser = user
  cash = 50000
  holdings = [
    { symbol: "AAPL", shares: 120, price: 178.50 },
    { symbol: "TSLA", shares: 45, price: 245.30 },
    { symbol: "VTI", shares: 310, price: 259.80 },
    { symbol: "BTC", shares: 0.42, price: 67200 }
  ]
  saveUser()
  showDashboard()
}

function loginUser() {
  const email = document.getElementById('login-email').value
  const password = document.getElementById('login-password').value
  const errorEl = document.getElementById('login-error')
  
  if (!email || !password) {
    errorEl.textContent = 'Please fill in all fields'
    return
  }
  
  const saved = localStorage.getItem('investsmart_users')
  const users = saved ? JSON.parse(saved) : []
  const user = users.find(u => u.email === email && u.password === password)
  
  if (!user) {
    errorEl.textContent = 'Invalid email or password'
    return
  }
  
  currentUser = user
  const data = localStorage.getItem('investsmart_user_' + user.id)
  if (data) {
    const parsed = JSON.parse(data)
    cash = parsed.cash || 50000
    holdings = parsed.holdings || [
      { symbol: "AAPL", shares: 120, price: 178.50 },
      { symbol: "TSLA", shares: 45, price: 245.30 },
      { symbol: "VTI", shares: 310, price: 259.80 },
      { symbol: "BTC", shares: 0.42, price: 67200 }
    ]
  }
  saveUser()
  showDashboard()
}

function logoutUser() {
  currentUser = null
  localStorage.removeItem('investsmart_user')
  document.getElementById('auth-screen').style.display = 'block'
  document.getElementById('dashboard').style.display = 'none'
}

function showDashboard() {
  document.getElementById('auth-screen').style.display = 'none'
  document.getElementById('dashboard').style.display = 'block'
  document.getElementById('user-name').textContent = currentUser.name
  initializeApp()
}

// Save user data whenever it changes
function saveUserData() {
  if (currentUser) {
    localStorage.setItem('investsmart_user_' + currentUser.id, JSON.stringify({
      cash: cash,
      holdings: holdings
    }))
    saveUser()
  }
}

// --- APP FUNCTIONS ---
function generateHistory(symbol, days = 30) {
  const prices = []
  let price = symbol === "AAPL" ? 275 : 
              symbol === "TSLA" ? 245 :
              symbol === "VTI" ? 260 :
              symbol === "BTCUSD" ? 67200 :
              symbol === "AMZN" ? 185 :
              symbol === "NVDA" ? 120 : 100
  
  for (let i = days; i >= 0; i--) {
    const change = (Math.random() - 0.48) * (symbol === "BTCUSD" ? 2000 : 8)
    price = Math.max(price + change, 10)
    const date = new Date()
    date.setDate(date.getDate() - i)
    prices.push({
      date: date.toLocaleDateString(),
      price: Math.round(price * 100) / 100
    })
  }
  return prices
}

function createChart(symbol) {
  const ctx = document.getElementById('chart').getContext('2d')
  const data = generateHistory(symbol)
  if (chart) chart.destroy()
  
  chart = new Chart(ctx, {
    type: 'line',
    data: {
      labels: data.map(d => d.date),
      datasets: [{
        label: symbol,
        data: data.map(d => d.price),
        borderColor: '#4ade80',
        backgroundColor: 'rgba(74, 222, 128, 0.1)',
        fill: true,
        tension: 0.3,
        pointRadius: 0,
        borderWidth: 2
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: {
        legend: { labels: { color: '#94a3b8', font: { size: 10 } } },
        tooltip: { callbacks: { label: function(context) { return '$' + context.parsed.y.toFixed(2) } } }
      },
      scales: {
        x: { grid: { color: 'rgba(148, 163, 184, 0.1)' }, ticks: { color: '#94a3b8', maxTicksLimit: 6, font: { size: 8 } } },
        y: { grid: { color: 'rgba(148, 163, 184, 0.1)' }, ticks: { color: '#94a3b8', callback: function(value) { return '$' + value.toFixed(0) } } }
      },
      animation: { duration: 800 }
    }
  })
  updateUI()
}

function changeChart(symbol) {
  currentSymbol = symbol
  document.querySelectorAll('.symbol-select button').forEach(btn => { btn.className = '' })
  document.getElementById('btn-' + symbol).className = 'active'
  createChart(symbol)
}

function updateUI() {
  const total = holdings.reduce((s, h) => s + (h.shares * h.price), 0)
  document.getElementById('cash').textContent = cash.toLocaleString()
  document.getElementById('total').textContent = total.toLocaleString()
  document.getElementById('count').textContent = holdings.length

  const list = document.getElementById('list')
  if (holdings.length === 0) {
    list.innerHTML = '<p style="color:#64748b; text-align:center; padding:20px 0;">No stocks. Buy some!</p>'
  } else {
    list.innerHTML = holdings.map(h => `
      <div class="row">
        <span><b>${h.symbol}</b> <span style="color:#94a3b8;font-size:0.7rem;">${h.shares}</span></span>
        <span class="green">$${h.price.toFixed(2)}</span>
        <span>$${(h.shares * h.price).toLocaleString()}</span>
        <button class="btn" onclick="openTrade('${h.symbol}', ${h.price})">Trade</button>
      </div>
    `).join('')
  }
  saveUserData()
}

function openTrade(symbol, price) {
  selectedStock = { symbol, price }
  document.getElementById('modal-title').textContent = 'Trade ' + symbol
  document.getElementById('modal-price').textContent = price
  document.getElementById('modal-shares').value = 1
  currentShares = 1
  tradeType = "BUY"
  document.getElementById('buy-tab').style.background = '#22c55e'
  document.getElementById('sell-tab').style.background = '#334155'
  document.getElementById('confirm-btn').textContent = 'Buy ' + symbol
  document.getElementById('confirm-btn').style.background = '#22c55e'
  updateModalTotal()
  document.getElementById('modal').classList.add('active')
}

function setTradeType(type) {
  tradeType = type
  if (type === 'BUY') {
    document.getElementById('buy-tab').style.background = '#22c55e'
    document.getElementById('sell-tab').style.background = '#334155'
    document.getElementById('confirm-btn').textContent = 'Buy ' + (selectedStock ? selectedStock.symbol : '')
    document.getElementById('confirm-btn').style.background = '#22c55e'
  } else {
    document.getElementById('buy-tab').style.background = '#334155'
    document.getElementById('sell-tab').style.background = '#ef4444'
    document.getElementById('confirm-btn').textContent = 'Sell ' + (selectedStock ? selectedStock.symbol : '')
    document.getElementById('confirm-btn').style.background = '#ef4444'
  }
}

function setShares(val) {
  document.getElementById('modal-shares').value = val
  currentShares = val
  updateModalTotal()
}

function updateModalTotal() {
  const shares = parseFloat(document.getElementById('modal-shares').value) || 0
  const total = selectedStock ? selectedStock.price * shares : 0
  document.getElementById('modal-total').textContent = total.toLocaleString()
}

function closeModal() {
  document.getElementById('modal').classList.remove('active')
}

function confirmTrade() {
  if (!selectedStock) return
  const shares = parseFloat(document.getElementById('modal-shares').value) || 0
  if (shares <= 0) { alert('Enter valid shares!'); return }
  
  const cost = selectedStock.price * shares
  
  if (tradeType === 'BUY') {
    if (cost > cash) { alert('Not enough cash!'); return }
    const existing = holdings.find(h => h.symbol === selectedStock.symbol)
    if (existing) {
      existing.shares += shares
    } else {
      holdings.push({ ...selectedStock, shares: shares })
    }
    cash -= cost
  } else {
    const existing = holdings.find(h => h.symbol === selectedStock.symbol)
    if (!existing || existing.shares < shares) { alert('Not enough shares!'); return }
    existing.shares -= shares
    if (existing.shares === 0) {
      holdings = holdings.filter(h => h.symbol !== selectedStock.symbol)
    }
    cash += cost
  }
  
  closeModal()
  updateUI()
}

function initializeApp() {
  createChart('AAPL')
  updateUI()
  
  setInterval(() => {
    if (chart) {
      const data = generateHistory(currentSymbol)
      chart.data.datasets[0].data = data.map(d => d.price)
      chart.data.labels = data.map(d => d.date)
      chart.update()
    }
  }, 3000)
}

document.getElementById('modal-shares').addEventListener('input', updateModalTotal)

// --- START ---
if (!checkAuth()) {
  document.getElementById('auth-screen').style.display = 'block'
  document.getElementById('dashboard').style.display = 'none'
}
</script>
</body>
                                                                                  </html>

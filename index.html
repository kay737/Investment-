<!DOCTYPE html>
<html>
<head>
  <title>InvestSmart</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: system-ui, sans-serif; }
    body { background: #0b1120; color: #e5e7eb; padding: 2rem; }
    .container { max-width: 1200px; margin: 0 auto; }
    h1 { font-size: 3rem; background: linear-gradient(135deg, #60a5fa, #fbbf24); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 1rem; margin: 2rem 0; }
    .card { background: #1e293b; padding: 1.5rem; border-radius: 12px; border: 1px solid #334155; }
    .card .value { font-size: 1.8rem; font-weight: bold; }
    .holdings { background: #1e293b; padding: 1.5rem; border-radius: 12px; border: 1px solid #334155; }
    .row { display: flex; justify-content: space-between; padding: 0.5rem 0; border-bottom: 1px solid #334155; }
    .btn { background: #3b82f6; color: white; border: none; padding: 1rem 2rem; border-radius: 8px; font-size: 1.1rem; cursor: pointer; margin-top: 1rem; }
  </style>
</head>
<body>
<div class="container">
  <h1>🚀 InvestSmart</h1>
  <p style="color: #94a3b8; margin: 0.5rem 0;">Your Investment Dashboard</p>
  
  <div class="grid">
    <div class="card"><div style="color:#94a3b8;">Portfolio</div><div class="value">$124,580</div></div>
    <div class="card"><div style="color:#94a3b8;">Today</div><div class="value" style="color:#4ade80;">+$1,240</div></div>
    <div class="card"><div style="color:#94a3b8;">Invested</div><div class="value">$98,200</div></div>
    <div class="card"><div style="color:#94a3b8;">Dividends</div><div class="value" style="color:#fbbf24;">$3,420</div></div>
  </div>
  
  <div class="holdings">
    <h3 style="color:#94a3b8;">📊 Your Holdings</h3>
    <div class="row"><span>AAPL</span><span>120 shares</span><span style="color:#4ade80;">+12%</span></div>
    <div class="row"><span>TSLA</span><span>45 shares</span><span style="color:#f87171;">-3%</span></div>
    <div class="row"><span>VTI</span><span>310 shares</span><span style="color:#4ade80;">+8%</span></div>
    <div class="row"><span>BTC</span><span>0.42 BTC</span><span style="color:#4ade80;">+15%</span></div>
  </div>
  
  <button class="btn" onclick="alert('🚀 Trading coming soon!')">Start Trading</button>
</div>
</body>
</html>
